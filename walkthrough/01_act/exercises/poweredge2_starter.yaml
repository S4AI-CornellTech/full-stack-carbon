# =====================================================================
#  Build-your-own capstone: a SECOND Dell PowerEdge.
#  Fill in every __FILL__ from your server's spec sheet, then run:
#     ./tutorial.sh exercises/poweredge2_starter.yaml   (from walkthrough/01_act/)
#  Compare your total to solutions/EXPECTED.md.
#  Reference BOM (a full server): ../../ACT/act/boms/dellr740.yaml
#  Duplicate the cpu.* / dram.* / ssd.* blocks to match your real socket/module/drive counts.
# =====================================================================
name: "PowerEdge <MODEL-TBD> (my build)"
silicon:
  # --- CPU sockets ---
  cpu.main0:
    area: __FILL__ cm2     # CPU die area (cm2 or mm2)
    process: __FILL__      # logic node: 28nm / 14nm / 10nm / 7nm / 5nm ...
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: __FILL__       # fab grid: a location (taiwan, usa, korea ...) or a source (coal, wind)
  # (duplicate as cpu.main1, ... for each socket)

  # --- DRAM modules ---
  dram.main0:
    model: dram
    process: __FILL__      # ddr3_50nm / ddr3_30nm / ddr4_10nm / lpddr4 ...
    n_ics: __FILL__        # ICs per module (drives packaging carbon)
    capacity: __FILL__ GB
  # (duplicate as dram.main1, ... for each module)

  # --- SSDs ---
  ssd.main0:
    model: flash
    process: __FILL__      # nand_30nm / nand_20nm / nand_10nm ...
    n_ics: __FILL__
    capacity: __FILL__ GB
  # (duplicate as ssd.main1, ... for each drive)

materials:
  # --- mainboard PCB (optional) ---
  board.pcb:
    category: pcb
    area: __FILL__ cm2
    layers: __FILL__       # 2 / 4 / 6 / 8 (interpolated otherwise)
