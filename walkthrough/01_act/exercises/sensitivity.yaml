# ACT sensitivity playground — one logic die + one DRAM.
# Change ONE field below, re-run, and watch one number move:
#   ./tutorial.sh exercises/sensitivity.yaml        (from walkthrough/01_act/)
#
#   knob A  soc.process   28nm -> 7nm              advanced node: MORE carbon per cm2
#   knob B  soc.fab_ci    coal -> wind             the fab grid drives the energy term
#   knob C  mem.process   ddr3_50nm -> ddr4_10nm   newer DRAM: far LESS carbon per GB
#           mem.capacity  64 GB -> 128 GB          memory carbon is linear in GB
name: ACT sensitivity playground
description: One logic die + one DRAM. Change ONE field, re-run, watch one number move.
silicon:
  soc:
    area: 7 cm2
    process: 28nm
    n_ics: 1
    fab_yield: 0.875
    gpa: 95
    fab_ci: coal
  mem:
    model: dram
    process: ddr3_50nm
    capacity: 64 GB
    n_ics: 1
